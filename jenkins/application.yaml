apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-mycicd-jenkins
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/raviagg/mycicd
    targetRevision: main
    path: jenkins

  destination:
    server: https://kubernetes.default.svc
    namespace: ns-mycicd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
